<section class="room-view bg-surface">
  @if (loading()) {
    <div class="room-view__loading gap-3 p-7">
      <mat-progress-spinner diameter="32" mode="indeterminate" />
      <span class="text-body-medium text-on-surface-variant">Loading room…</span>
    </div>
  } @else if (room(); as r) {
    <header class="room-view__header px-5 py-4 border-b-outline-variant">
      <div class="room-view__title-row gap-2">
        <mat-icon class="room-view__icon text-on-surface-variant">
          {{ r.visibility === 'private' ? 'lock' : 'tag' }}
        </mat-icon>
        <h1 class="text-title-medium m-0">{{ r.name }}</h1>
      </div>
      @if (r.description) {
        <p class="room-view__description text-body-medium text-on-surface-variant m-0 mt-1">
          {{ r.description }}
        </p>
      }
    </header>

    <app-message-list class="room-view__messages" [roomId]="r.id" />
    <app-message-composer
      class="room-view__composer"
      [roomId]="r.id"
      (messageSent)="onMessageSent($event)"
    />
  } @else if (loadError()) {
    <div class="room-view__error bg-error-container text-on-error-container p-4 m-5 gap-3">
      <mat-icon>error_outline</mat-icon>
      <span class="text-body-medium">Unable to load this room.</span>
    </div>
  }
</section>
